<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruby Store — ສົ່ງຂໍ້ຄວາມສຳເລັດ!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://wqxzobxqkwyrffvibdxg.supabase.co">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" as="script">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2a3b8d97">
  <script src="i18n.js?v=736d2c21" defer></script>
</head>
<body>

<!-- ===================== NAVBAR (minimal) ===================== -->
<nav class="navbar" id="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      Ruby <span>Store</span>
    </a>
    <div class="navbar-spacer"></div>
  </div>
</nav>

<!-- ===================== SUCCESS PAGE ===================== -->
<div class="page-body-no-nav" style="padding-bottom:60px;min-height:80vh;">
  <div class="container">
    <div class="success-page" id="successPage">

      <!-- Confetti dots -->
      <div class="confetti-dot" style="left:10%;top:15%;background:#E53935;animation-delay:0s;"></div>
      <div class="confetti-dot" style="left:25%;top:8%;background:#FBBF24;animation-delay:.2s;"></div>
      <div class="confetti-dot" style="left:50%;top:5%;background:#25D366;animation-delay:.4s;"></div>
      <div class="confetti-dot" style="left:70%;top:10%;background:#3B82F6;animation-delay:.1s;"></div>
      <div class="confetti-dot" style="left:85%;top:18%;background:#E53935;animation-delay:.3s;"></div>
      <div class="confetti-dot" style="left:15%;top:35%;background:#0084FF;animation-delay:.5s;"></div>
      <div class="confetti-dot" style="left:80%;top:40%;background:#FBBF24;animation-delay:.2s;"></div>

      <!-- Logo -->
      <div class="success-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--red)">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Ruby Store
      </div>

      <!-- Check Circle -->
      <div class="success-check">✓</div>
      <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:8px;">ສົ່ງຂໍ້ຄວາມສຳເລັດ!</h1>
      <p class="sub">ຮ້ານສິຢືນຢັນອໍເດີພາຍໃນ 24 ຊົ່ວໂມງ</p>

      <!-- Order Number -->
      <div class="order-number-card">
        <div class="order-number-label">ໝາຍເລກອໍເດີ</div>
        <div class="order-number" id="orderNumber">RB------</div>
      </div>

      <!-- Order Info -->
      <div class="order-info-row" id="orderInfoRow">
        <div class="order-info-item">
          <span style="font-size:1.2rem;">👤</span>
          <div>
            <div style="font-size:0.72rem;color:var(--muted);">ຊື່</div>
            <div style="font-weight:700;font-size:0.875rem;" id="infoName">-</div>
          </div>
        </div>
        <div class="order-info-item">
          <span style="font-size:1.2rem;">💬</span>
          <div>
            <div style="font-size:0.72rem;color:var(--muted);">ຊ່ອງທາງ</div>
            <div style="font-weight:700;font-size:0.875rem;" id="infoChannel">-</div>
          </div>
        </div>
        <div class="order-info-item">
          <span style="font-size:1.2rem;">💰</span>
          <div>
            <div style="font-size:0.72rem;color:var(--muted);">ຍອດລວມ</div>
            <div style="font-weight:700;font-size:0.875rem;color:var(--red);" id="infoTotal">-</div>
          </div>
        </div>
        <div class="order-info-item">
          <span style="font-size:1.2rem;">🚚</span>
          <div>
            <div style="font-size:0.72rem;color:var(--muted);">ຈັດສົ່ງ</div>
            <div style="font-weight:700;font-size:0.875rem;" id="infoDelivery">-</div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="order-timeline">
        <div class="timeline-title">ສະຖານະອໍເດີ</div>
        <div class="timeline-items">
          <div class="timeline-item">
            <div class="timeline-dot done"></div>
            <div class="timeline-text">
              <div class="t-title">ສົ່ງຂໍ້ຄວາມສຳເລັດ</div>
              <div class="t-sub" id="tlDate">-</div>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot current"></div>
            <div class="timeline-text">
              <div class="t-title">ລໍຖ້າຮ້ານຢືນຢັນ</div>
              <div class="t-sub">ພາຍໃນ 24 ຊມ.</div>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot pending"></div>
            <div class="timeline-text">
              <div class="t-title">ກຽມຈັດສົ່ງ</div>
              <div class="t-sub">1-2 ວັນທຳການ</div>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot pending"></div>
            <div class="timeline-text">
              <div class="t-title">ຈັດສົ່ງແລ້ວ</div>
              <div class="t-sub">ຮັບ Tracking ທາງ WA/Messenger</div>
            </div>
          </div>
        </div>
      </div>

      <!-- CTAs -->
      <div class="success-btns">
        <a href="shop.html" class="btn btn-primary">🛍️ ຊື້ສິນຄ້າຕໍ່</a>
        <a href="index.html" class="btn btn-outline">🏠 ກັບໜ້າຫຼັກ</a>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="app.js?v=8a8e76b3"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Load order data from localStorage (npx serve drops query strings)
    const lastOrder = JSON.parse(localStorage.getItem('ruby_last_order') || '{}');
    const orderNo = lastOrder.orderNo || ('RB' + Date.now().toString().slice(-6));
    document.getElementById('orderNumber').textContent = orderNo;

    // Date
    const now = new Date();
    const dateStr = now.toLocaleDateString('lo-LA', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    document.getElementById('tlDate').textContent = dateStr;

    // lastOrder already loaded above
    if (lastOrder.name) document.getElementById('infoName').textContent = lastOrder.name;
    if (lastOrder.channel) document.getElementById('infoChannel').textContent = lastOrder.channel === 'wa' ? 'WhatsApp' : 'Messenger';
    if (lastOrder.total !== undefined) document.getElementById('infoTotal').textContent = '₭' + lastOrder.total.toLocaleString();
    if (lastOrder.delivery) document.getElementById('infoDelivery').textContent = lastOrder.delivery;

    showToast('ສັ່ງຊື້ສຳເລັດ! 🎉', 'success');
  });
</script>
</body>
</html>
